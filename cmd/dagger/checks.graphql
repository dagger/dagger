query CheckGroupListDetails($id: CheckGroupID!) {
  group: loadCheckGroupFromID(id: $id) {
    list {
      name
      description
      checkType
    }
  }
}

query CheckGroupRunStatuses($checkGroup: CheckGroupID!) {
  checkGroup: loadCheckGroupFromID(id: $checkGroup) {
    run {
      list {
        passed
      }
    }
  }
}

query CheckGroupRunStatusesFailFast($checkGroup: CheckGroupID!) {
  checkGroup: loadCheckGroupFromID(id: $checkGroup) {
    run(failFast: true) {
      list {
        passed
      }
    }
  }
}
