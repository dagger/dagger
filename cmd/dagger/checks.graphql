query CheckGroupListDetails($id: ID!) {
  group: node(id: $id) {
    list {
      name
      description
    }
  }
}

query CheckGroupRunStatuses($checkGroup: ID!) {
  checkGroup: node(id: $checkGroup) {
    run {
      list {
        passed
      }
    }
  }
}

query CheckGroupRunStatusesFailFast($checkGroup: CheckGroupID!) {
  checkGroup: loadCheckGroupFromID(id: $checkGroup) {
    run(failFast: true) {
      list {
        passed
      }
    }
  }
}
