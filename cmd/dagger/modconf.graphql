query ModuleConfig($source: ModuleSourceID!) {
  source: loadModuleSourceFromID(id: $source) {
    asString
    kind
    sourceRootSubpath
    asLocalSource {
      rootSubpath
    }
    asGitSource {
      root
      version
      commit
      rootSubpath
    }
    module: asModule {
      name
      initialize {
        description
      }
      dependencies {
        name
        description
        source {
          asString
          pin
        }
      }
    }
  }
}
