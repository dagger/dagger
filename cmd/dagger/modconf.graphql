query ModuleConfig($source: ID!) {
  source: node(id: $source) {
    kind
    digest
    asString
    sourceRootSubpath
    commit
    version
    htmlRepoURL
    module: asModule {
      name
      description
      dependencies {
        name
        description
        source {
          id
          asString
          digest
        }
      }
    }
  }
}
