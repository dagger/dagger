# Adding ruff ignores here to avoid a noqa comment in the snippets
# and very doc specific rules in the SDK's pyproject.toml.
extend = "../../.ruff.toml"

[lint]
ignore = [
    "D1",    # docstrings
    "E501",  # line too long
    "S108",  # probable insecure usage of temporary file or directory
    "T201",  # `print` found
]
