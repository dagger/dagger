# Fragments for the TypeDefs introspection. The query operation is built in
# module_inspect.go (plain and include-scoped variants) so the two only differ
# in the optional include argument.

fragment TypeDefRefParts on TypeDef {
	name
	optional
}

fragment FunctionParts on Function {
	name
	description
	sourceModuleName
	returnType {
		...TypeDefRefParts
	}
	args {
		name
		description
		defaultValue
		defaultPath
		ignore
		typeDef {
			...TypeDefRefParts
		}
	}
}

fragment FieldParts on FieldTypeDef {
	name
	description
	typeDef {
		...TypeDefRefParts
	}
}

fragment TypeDefParts on TypeDef {
	name
	kind
	optional
	asObject {
		name
		description
		sourceModuleName
		constructor {
			...FunctionParts
		}
		functions {
			...FunctionParts
		}
		fields {
			...FieldParts
		}
	}
	asScalar {
		name
		description
		sourceModuleName
	}
	asEnum {
		name
		description
		sourceModuleName
		members {
			name
			description
		}
	}
	asInterface {
		name
		description
		sourceModuleName
		functions {
			...FunctionParts
		}
	}
	asInput {
		name
		fields {
			...FieldParts
		}
	}
	asList {
		elementTypeDef {
			...TypeDefRefParts
		}
	}
}
