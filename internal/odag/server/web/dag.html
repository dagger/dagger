<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODAG DAG</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="data-body dag-body">
    <div class="home-shell data-home-shell">
      <main class="data-surface dag-surface">
        <header class="data-header dag-header">
          <div class="data-header-copy">
            <p class="data-eyebrow">ODAG</p>
            <h1>Navigate the object DAG</h1>
            <p id="dagSubtitle" class="data-subtitle">
              A global object graph by default. The view shows object dependencies only, not call or provenance overlays.
            </p>
          </div>
          <div class="data-header-actions">
            <button id="backBtn" class="btn btn-secondary" type="button">Back</button>
            <a id="openTraceLink" class="btn btn-secondary" href="/">Trace</a>
            <button id="refreshBtn" class="btn" type="button">Refresh</button>
          </div>
        </header>

        <section class="data-toolbar dag-toolbar">
          <div class="data-toolbar-group">
            <label class="data-field" for="modeSelect">
              <span class="data-field-label">View</span>
              <select id="modeSelect" class="text-input">
                <option value="hybrid">Hybrid</option>
                <option value="object">Object focus</option>
                <option value="scope">Call scope</option>
                <option value="global">Global</option>
              </select>
            </label>
            <label class="data-field" for="dependencyHops">
              <span class="data-field-label">Dependency hops</span>
              <select id="dependencyHops" class="text-input">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </label>
            <label class="toggle-input data-toggle">
              <input id="liveOnly" type="checkbox" />
              Live objects only
            </label>
            <label class="toggle-input data-toggle">
              <input id="keepRules" type="checkbox" />
              Keep only relevant objects
            </label>
            <label class="toggle-input data-toggle">
              <input id="includeInternal" type="checkbox" />
              Include internal spans/events
            </label>
          </div>
          <div class="data-toolbar-group dag-toolbar-actions">
            <button id="clearFocusBtn" class="btn btn-secondary" type="button">Clear Focus</button>
            <button id="clearScopeCallBtn" class="btn btn-secondary" type="button">Clear Call Scope</button>
          </div>
        </section>

        <section class="data-status-bar dag-status-bar">
          <div id="scopeSummary" class="data-scope-summary"></div>
          <div id="statusNote" class="data-status-note"></div>
        </section>

        <section id="statGrid" class="dag-stat-grid"></section>

        <section class="dag-layout">
          <aside class="dag-sidebar">
            <section class="dag-sidebar-section">
              <div class="dag-section-head">
                <h2>Visible objects</h2>
                <span id="objectListMeta" class="dag-section-meta"></span>
              </div>
              <div id="objectList" class="dag-object-list"></div>
            </section>

            <section class="dag-sidebar-section">
              <div class="dag-section-head">
                <h2>Inspector</h2>
              </div>
              <div id="inspector" class="dag-inspector"></div>
            </section>
          </aside>

          <section class="dag-canvas-panel">
            <svg id="dagCanvas" class="dag-canvas" viewBox="0 0 1200 800" preserveAspectRatio="xMinYMin meet"></svg>
            <div id="dagEmpty" class="graph-empty">Loading object DAG...</div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="/dag.js"></script>
  </body>
</html>
