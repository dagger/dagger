<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODAG V3 Entity Explorer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="v3-body">
    <div class="v3-shell">
      <aside class="v3-sidebar">
        <div class="v3-sidebar-brand" aria-label="ODAG">
          <span class="v3-brand-icon">O</span>
          <span class="v3-brand-title">ODAG</span>
        </div>

        <nav id="entityNav" class="v3-type-nav" aria-label="Entity domains"></nav>
      </aside>

      <main class="v3-main">
        <header class="v3-topbar">
          <div>
            <p id="pageLabel" class="v3-topbar-label">Domain</p>
            <h2 id="pageTitle" class="v3-page-title">Terminals</h2>
          </div>
        </header>

        <section class="v3-content">
          <section class="v3-panel">
            <div class="v3-panel-head">
              <div>
                <h3 id="tableTitle">Terminals</h3>
              </div>
              <div id="tableMeta" class="v3-submeta"></div>
            </div>
            <div id="tableShell" class="v3-table-shell"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="/v3.js"></script>
  </body>
</html>
