<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODAG Traces</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="home-shell">
      <section class="panel home-panel">
        <header class="panel-header">
          <h1>ODAG</h1>
          <p>Select a trace to open the full ODAG view.</p>
        </header>
        <div class="trace-toolbar">
          <button id="refreshTracesBtn" class="btn">Refresh</button>
          <input id="cloudTraceID" class="text-input" placeholder="Cloud trace ID" />
          <input id="cloudOrg" class="text-input" placeholder="Org (optional)" />
          <button id="importCloudBtn" class="btn">Import</button>
        </div>
        <div class="home-hint">Click any trace row to open `/traces/&lt;trace-id&gt;`.</div>
        <div id="traceList" class="trace-list"></div>
      </section>
    </div>
    <script type="module" src="/home.js"></script>
  </body>
</html>
