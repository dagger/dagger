<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="v3-body">
    <div class="v3-shell">
      <aside class="v3-sidebar">
        <a id="sidebarBrand" class="v3-sidebar-brand" href="/" data-route-path="/" aria-label="ODAG overview">
          <span class="v3-brand-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" role="presentation" focusable="false">
              <rect x="2" y="2" width="4" height="4" rx="0.8"></rect>
              <rect x="10" y="2" width="4" height="4" rx="0.8"></rect>
              <rect x="2" y="10" width="4" height="4" rx="0.8"></rect>
              <rect x="10" y="10" width="4" height="4" rx="0.8"></rect>
            </svg>
          </span>
          <span class="v3-brand-title">ODAG</span>
        </a>

        <nav id="entityNav" class="v3-type-nav" aria-label="Entity domains"></nav>
      </aside>

      <main class="v3-main">
        <header class="v3-topbar">
          <div class="v3-topbar-start">
            <select id="workspaceFilter" class="v3-topbar-select" aria-label="Workspace filter">
              <option value="">Workspace</option>
            </select>
          </div>
          <nav id="pageCrumb" class="v3-breadcrumb" aria-label="Breadcrumb">Overview</nav>
          <div class="v3-topbar-end">
            <div id="importTraceShell"></div>
            <div id="sessionFilterShell"></div>
          </div>
        </header>

        <section class="v3-content">
          <section class="v3-panel">
            <div class="v3-panel-head">
              <div>
                <h3 id="tableTitle">Terminals</h3>
              </div>
              <div id="tableMeta" class="v3-submeta"></div>
            </div>
            <div id="tableShell" class="v3-table-shell"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="/v3.js"></script>
  </body>
</html>
