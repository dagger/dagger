<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODAG Explorer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="data-body">
    <div class="home-shell data-home-shell">
      <main class="data-surface">
        <header class="data-header">
          <div class="data-header-copy">
            <p class="data-eyebrow">ODAG</p>
            <h1>Browse objects and events</h1>
            <p class="data-subtitle">
              A web-style explorer for ODAG data. Click trace, session, and client chips in any row to narrow the view.
            </p>
          </div>
          <div class="data-header-actions">
            <button id="refreshBtn" class="btn" type="button">Refresh</button>
            <button id="clearScopeBtn" class="btn btn-secondary" type="button">Clear Scope</button>
          </div>
        </header>

        <section class="data-toolbar">
          <div class="data-toolbar-group">
            <label class="data-field" for="traceFilter">
              <span class="data-field-label">Trace</span>
              <input id="traceFilter" class="text-input" placeholder="Optional trace ID" />
            </label>
            <label class="toggle-input data-toggle">
              <input id="includeInternal" type="checkbox" />
              Include internal spans/events
            </label>
          </div>
          <div class="data-toolbar-group data-toolbar-group-import">
            <label class="data-field" for="cloudTraceID">
              <span class="data-field-label">Import trace</span>
              <input id="cloudTraceID" class="text-input" placeholder="Cloud trace ID" />
            </label>
            <label class="data-field" for="cloudOrg">
              <span class="data-field-label">Org</span>
              <input id="cloudOrg" class="text-input" placeholder="Optional org" />
            </label>
            <button id="importCloudBtn" class="btn" type="button">Import</button>
          </div>
        </section>

        <section class="data-status-bar">
          <div id="scopeSummary" class="data-scope-summary"></div>
          <div id="statusNote" class="data-status-note"></div>
        </section>

        <nav class="data-tabs" aria-label="ODAG explorer pages">
          <button class="data-tab is-active" data-page-tab="objects" type="button">Objects</button>
          <button class="data-tab" data-page-tab="events" type="button">Events</button>
        </nav>

        <section class="data-pages">
          <section class="data-page is-active" data-page="objects">
            <div class="data-page-toolbar">
              <label class="data-field data-field-grow" for="objectSearch">
                <span class="data-field-label">Search</span>
                <input id="objectSearch" class="text-input" placeholder="Alias, type, state, trace, session, client" />
              </label>
              <label class="data-field" for="objectStatus">
                <span class="data-field-label">Status</span>
                <select id="objectStatus" class="text-input">
                  <option value="all">All</option>
                  <option value="live">Live</option>
                  <option value="archived">Archived</option>
                </select>
              </label>
              <label class="data-field" for="objectSort">
                <span class="data-field-label">Sort</span>
                <select id="objectSort" class="text-input">
                  <option value="recent">Recently updated</option>
                  <option value="alias">Alias</option>
                  <option value="type">Type</option>
                  <option value="states">Most states</option>
                  <option value="trace">Trace</option>
                </select>
              </label>
              <div id="objectMeta" class="data-page-meta"></div>
            </div>
            <div id="objectTable" class="data-table-shell"></div>
          </section>

          <section class="data-page" data-page="events">
            <div class="data-page-toolbar">
              <label class="data-field data-field-grow" for="eventSearch">
                <span class="data-field-label">Search</span>
                <input id="eventSearch" class="text-input" placeholder="Name, status, binding, call, trace, session, client" />
              </label>
              <label class="data-field" for="eventKind">
                <span class="data-field-label">Kind</span>
                <select id="eventKind" class="text-input">
                  <option value="all">All</option>
                  <option value="call">Calls</option>
                  <option value="mutation">Mutations</option>
                  <option value="span">Spans</option>
                </select>
              </label>
              <label class="data-field" for="eventSort">
                <span class="data-field-label">Sort</span>
                <select id="eventSort" class="text-input">
                  <option value="newest">Newest first</option>
                  <option value="oldest">Oldest first</option>
                  <option value="name">Name</option>
                  <option value="kind">Kind</option>
                  <option value="trace">Trace</option>
                </select>
              </label>
              <div id="eventMeta" class="data-page-meta"></div>
            </div>
            <div id="eventTable" class="data-table-shell"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="/home.js"></script>
  </body>
</html>
