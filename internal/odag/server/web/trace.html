<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODAG Trace</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="trace-shell">
      <aside class="panel history-panel">
        <div class="history-header">
          <h2>History</h2>
          <div class="history-meta">
            <span id="traceStatus" class="history-status">unknown</span>
            <span id="historyPosition" class="history-position">0 / 0</span>
          </div>
        </div>
        <div class="event-filters">
          <label><input id="filterCalls" type="checkbox" /> calls</label>
          <label><input id="filterDerived" type="checkbox" /> derived</label>
          <label><input id="filterVisible" type="checkbox" /> visible</label>
        </div>
        <div id="historyList" class="history-list"></div>
      </aside>

      <main class="main-panel">
        <section class="trace-title-panel panel">
          <div class="trace-title-row">
            <h2 id="traceTitle" class="trace-title">Trace</h2>
            <button id="backBtn" class="btn">Traces</button>
          </div>
          <p id="traceSubtitle" class="trace-subtitle"></p>
        </section>

        <section class="graph-panel panel">
          <svg id="graphCanvas" class="graph-canvas" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet"></svg>
          <div id="graphEmpty" class="graph-empty">Loading trace projection...</div>
        </section>
      </main>

      <aside class="panel inspector-panel">
        <h2>Inspector</h2>
        <div id="inspector"></div>
      </aside>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
